<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Recall — Architecture Diagram</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #020817;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 32px;
  }
</style>
</head>
<body>

    <linearGradient id="gAurora" x1="0%" y1="0%" x2="100%" y2="100%">

      <stop offset="0%" stop-color="#D97706" stop-opacity="0.2"/><stop offset="100%" stop-color="#D97706" stop-opacity="0.05"/>

    <linearGradient id="gLine" x1="0%" y1="0%" x2="100%" y2="0%">

      <path d="M 0 0 L 6 3 L 0 6 z" fill="#06B6D4" opacity="0.6"/>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>

  <text x="370" y="198" text-anchor="middle" fill="#6366F1" font-size="11" font-weight="600">API Routes (Edge Functions)</text>

  <text x="453" y="395" text-anchor="middle" fill="#67E8F9" font-size="9">embeddings.ts</text>

  <text x="670" y="453" text-anchor="middle" fill="#475569" font-size="9">✓ Native pgvector + HNSW indexing</text>
